<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4A0E8F">
  <title>Gestou - Sem Conexão</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #4A0E8F;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .container { max-width: 400px; }
    .icon {
      font-size: 64px;
      margin-bottom: 24px;
      opacity: 0.9;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    p {
      font-size: 16px;
      opacity: 0.85;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .btn-retry {
      display: inline-block;
      padding: 14px 40px;
      background: #fff;
      color: #4A0E8F;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn-retry:hover { opacity: 0.9; }
    .btn-retry:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&#128268;</div>
    <h1>Você está sem conexão</h1>
    <p>Verifique sua conexão com a internet e tente novamente.</p>
    <button class="btn-retry" onclick="window.location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
